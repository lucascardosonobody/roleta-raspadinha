<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Roleta de Prêmios</title>
    <script src="/config.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html, body {
            margin: 0;
            padding: 0;
        }

        body {
           font-family: 'Montserrat', Arial, sans-serif;
            min-height: 100vh;
            overflow-x: hidden;
            margin: 0;
            padding: 0;
            position: relative;
        }

        #video-fundo {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            object-fit: cover;
            z-index: -1;
        }


        .main-wrapper {
            width: 100%;
            margin: 0;
            padding: 0;
        }

        .topo-imagem {
            width: 100%;
            display: block;
            margin: 0 auto;
            vertical-align: top;
            height: 180px;
            object-fit: contain;
            object-position: center;
            background: transparent;
        }
        
        @keyframes pulsar {
            0%, 100% { transform: translate(-50%, -50%) scale(1); }
            50% { transform: translate(-50%, -50%) scale(1.05); }
        }

        @media (max-width: 768px) {
            .texto-sobre-imagem {
                font-size: 1.2em;
                padding: 15px 25px;
                letter-spacing: 1px;
            }
        }

        @media (max-width: 480px) {
            .texto-sobre-imagem {
                font-size: 0.9em;
                padding: 10px 20px;
                letter-spacing: 0.5px;
            }
        }

        .content-wrapper {
            display: grid;
            grid-template-columns: auto 1fr;
            gap: 30px;
            align-items: start;
            padding: 30px 20px;
            max-width: 1400px;
            margin: 0 auto;
        }

        .container {
            width: 100%;
            text-align: center;
        }

        .card-premios {
            background: white;
            border-radius: 15px;
            padding: 20px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.3);
            min-width: 220px;
            max-width: 280px;
        }

        .card-premios h3 {
            color: #667eea;
            font-size: 1em;
            margin-bottom: 15px;
            text-align: center;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            line-height: 1.3;
        }

        .premio-item {
            background: linear-gradient(135deg, #ffd700, #ffed4e);
            padding: 12px;
            border-radius: 10px;
            margin-bottom: 10px;
            font-weight: 700;
            color: #333;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
            text-align: center;
            font-size: 0.9em;
            line-height: 1.3;
        }

        .premio-item:last-child {
            margin-bottom: 0;
        }

        .card-premios .sem-premios {
            color: #999;
            text-align: center;
            padding: 20px;
            font-style: italic;
        }

        .container {
            min-width: 0;
        }

        .roleta-wrapper {
            width: 100%;
            margin: 0 auto 50px;
        }

        h1 {
            color: #fff !important;
            font-size: 1.5em !important;
            margin-bottom: 10px;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.3);
            display: block !important;
            opacity: 1 !important;
        }

        .premio-rotativo {
            color: #ffd700 !important;
            animation: pulsar 1s ease-in-out infinite;
            font-size: 0.9em;
            display: inline-block;
        }

        @keyframes pulsar {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.05); }
        }

        .info-participantes {
            color: #fff;
            font-size: 1.1em;
            margin-bottom: 30px;
            background: rgba(255,255,255,0.2);
            padding: 10px 20px;
            border-radius: 20px;
            display: inline-block;
        }

        .roleta-wrapper {
            position: relative;
            width: 100%;
            max-width: 530px;
            margin: 0 auto 50px;
        }

        .seta-indicador{
            position:absolute;
            top:-10px;
            left:50%;
            transform:translateX(-50%) rotate(-45deg);
            width:22px;
            height:22px;
            filter:
                drop-shadow(0 2px 4px rgba(0,0,0,.35))
                drop-shadow(0 10px 18px rgba(0,0,0,.18));
            z-index:9999;
            pointer-events:none;
            isolation:isolate;
        }

        .seta-indicador::after{
            content:"";
            position:absolute;
            inset:-2px;
            border-radius:50% 50% 50% 0;
            background:#fff;
            z-index:0;
        }

        .seta-indicador::before{
            content:"";
            position:absolute;
            inset:0;
            border-radius:50% 50% 50% 0;
            background:#B8860B;
            z-index:1;
        }

        .roleta-container {
            position: relative;
            width: 100%;
            aspect-ratio: 1;
            margin: 0 auto;
        }

        #roletaCanvas {
            width: 100%;
            height: 100%;
            border-radius: 50%;
            box-shadow: 0 10px 40px rgba(0,0,0,0.4);
            transition: transform 0.1s ease-out;
            border: 8px solid #B8860B;
        }

        .centro-roleta {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 200px;
            height: 200px;
            background: #fff;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 4px 15px rgba(0,0,0,0.3);
            z-index: 5;
            pointer-events: none;
            padding: 20px;
        }

        .logo-roleta {
            width: 100%;
            height: 100%;
            object-fit: contain;
        }

        .mensagem-aguardando {
            text-align: center;
            font-size: 0.85em;
            font-weight: 700;
            color: #667eea;
            line-height: 1.4;
            padding: 10px;
        }

        .btn-girar {
            background: linear-gradient(135deg, #ffd700, #ffed4e);
            color: #333;
            border: none;
            padding: 20px 50px;
            font-size: 1.5em;
            font-weight: 900;
            border-radius: 50px;
            cursor: pointer;
            box-shadow: 0 6px 0 #b8860b, 0 10px 20px rgba(0,0,0,0.3);
            transition: all 0.2s;
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        .btn-girar:hover:not(:disabled) {
            transform: translateY(-2px);
            box-shadow: 0 8px 0 #b8860b, 0 12px 25px rgba(0,0,0,0.4);
        }

        .btn-girar:active:not(:disabled) {
            transform: translateY(3px);
            box-shadow: 0 3px 0 #b8860b, 0 5px 10px rgba(0,0,0,0.3);
        }

        .btn-girar:disabled {
            opacity: 0.6;
            cursor: not-allowed;
        }

        .resultado {
            display: none;
            background: #fff;
            padding: 12px 20px;
            border-radius: 15px 15px 0 0;
            box-shadow: 0 -5px 20px rgba(0,0,0,0.4);
            animation: slideUp 0.5s ease-out;
            position: fixed;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            width: 90%;
            min-width: 150px;
            max-width: 600px;
            margin: 0;
            box-sizing: border-box;
            z-index: 9999;
        }

        .resultado.ativo {
            display: block;
        }

        @keyframes slideUp {
            from {
                opacity: 0;
                transform: translateX(-50%) translateY(100%);
            }
            to {
                opacity: 1;
                transform: translateX(-50%) translateY(0);
            }
        }

        .resultado h2 {
            color: #667eea;
            font-size: clamp(1.2em, 4vw, 1.5em);
            margin-bottom: 10px;
            text-align: center;
            font-weight: 800;
        }

        .resultado .ganhador {
            font-size: clamp(1em, 3.5vw, 1.4em);
            color: #333;
            font-weight: 900;
            margin: 10px 0;
            text-align: center;
            word-wrap: break-word;
            overflow-wrap: break-word;
            word-break: break-word;
            hyphens: auto;
            width: 100%;
            max-width: 100%;
            padding: 8px;
            box-sizing: border-box;
            line-height: 1.2;
            white-space: normal;
            overflow: hidden;
            text-overflow: clip;
        }

        .resultado .ganhador.nome-extra-longo {
            font-size: clamp(0.85em, 2.8vw, 1.1em) !important;
            line-height: 1.1;
            padding: 6px;
            letter-spacing: -0.5px;
        }

        .resultado .premio {
            font-size: clamp(0.9em, 3vw, 1.2em);
            color: #fff;
            font-weight: 700;
            background: linear-gradient(135deg, #667eea, #764ba2);
            padding: 10px 15px;
            border-radius: 8px;
            text-align: center;
            word-wrap: break-word;
            overflow-wrap: break-word;
            width: 100%;
            box-sizing: border-box;
        }

        .aviso {
            color: #fff;
            background: rgba(255,68,68,0.9);
            padding: 20px;
            border-radius: 15px;
            margin-top: 20px;
            font-size: 1.1em;
        }

        .loading {
            color: #fff;
            font-size: 1.2em;
            margin-top: 20px;
        }

        @media (max-width: 1024px) {
            .content-wrapper {
                padding: 20px 15px;
                gap: 20px;
            }

            .card-premios {
                min-width: 200px;
                max-width: 240px;
                padding: 18px;
            }

            .card-premios h3 {
                font-size: 1.1em;
            }

            .premio-item {
                padding: 10px;
                font-size: 0.85em;
            }

            h1 {
                font-size: 1.3em;
            }

            .roleta-wrapper {
                max-width: 400px;
                margin: 0 auto 40px;
            }

            .centro-roleta {
                width: 150px;
                height: 150px;
            }

            .mensagem-aguardando {
                font-size: 0.75em;
            }

            .resultado {
                padding: 12px 18px;
                width: 88%;
                max-width: 450px;
                padding: 10px 18px;
            }
            
            .resultado h2 {
                font-size: clamp(1.1em, 3.8vw, 1.4em);
                margin-bottom: 8px;
            }
            
            .resultado .ganhador {
                font-size: clamp(0.95em, 3.2vw, 1.3em);
                margin: 8px 0;
                padding: 7px;
            }
            
            .resultado .ganhador.nome-extra-longo {
                font-size: clamp(0.8em, 2.5vw, 1em) !important;
            }
            
            .resultado .premio {
                font-size: clamp(0.85em, 2.8vw, 1.1em);
                padding: 9px 12px;
            }
        }

        @media (max-width: 768px) {
            .topo-imagem {
                max-height: 140px;
                object-fit: cover;
            }

            .content-wrapper {
                grid-template-columns: auto 1fr;
                padding: 15px 10px;
                gap: 10px;
            }

            .card-premios {
                min-width: 160px;
                max-width: 180px;
                padding: 15px;
            }

            .card-premios h3 {
                font-size: 0.95em;
                margin-bottom: 10px;
            }

            .premio-item {
                padding: 8px;
                font-size: 0.75em;
                margin-bottom: 8px;
            }

            h1 {
                font-size: 1.1em;
            }

            .info-participantes {
                font-size: 0.95em;
                padding: 8px 15px;
            }

            .roleta-wrapper {
                max-width: 240px;
            }

            .centro-roleta {
                width: 120px;
                height: 120px;
                padding: 15px;
            }

            .mensagem-aguardando {
                font-size: 0.65em;
            }

            .btn-girar {
                padding: 12px 30px;
                font-size: 1.1em;
            }

            .resultado {
                bottom: 15px;
                width: 85%;
                max-width: 400px;
                padding: 10px 15px;
            }
                    
            .resultado h2 {
                font-size: clamp(1em, 3.5vw, 1.3em);
                margin-bottom: 7px;
            }
            
            .resultado .ganhador {
                font-size: clamp(0.9em, 3vw, 1.2em);
                margin: 7px 0;
                padding: 6px;
            }
            
            .resultado .ganhador.nome-extra-longo {
                font-size: clamp(0.75em, 2.2vw, 0.95em) !important;
            }
            
            .resultado .premio {
                font-size: clamp(0.8em, 2.5vw, 1em);
                padding: 8px 10px;
            }
        }

        @media (max-width: 480px) {
            .topo-imagem {
                height: 100%px;
            }

            .content-wrapper {
                gap: 8px;
                padding: 10px 5px;
            }

            .card-premios {
                min-width: 120px;
                max-width: 140px;
                padding: 12px;
            }

            .card-premios h3 {
                font-size: 0.8em;
                margin-bottom: 8px;
            }

            .premio-item {
                padding: 6px;
                font-size: 0.65em;
                margin-bottom: 6px;
            }

            h1 {
                font-size: 0.85em;
                margin-bottom: 8px;
            }

            .info-participantes {
                font-size: 0.7em;
                padding: 5px 10px;
                margin-bottom: 10px;
            }

            .roleta-wrapper {
                max-width: 210px;
                margin-bottom: 15px;
            }

            .centro-roleta {
                width: 70px;
                height: 70px;
                padding: 8px;
            }

            .mensagem-aguardando {
                font-size: 0.5em;
                line-height: 1.2;
            }

            .btn-girar {
                padding: 8px 20px;
                font-size: 0.85em;
                letter-spacing: 1px;
            }

            .resultado {
                bottom: 10px;
                width: 90%;
                max-width: 320px;
                padding: 8px 12px;
            }
            
            .resultado h2 {
                font-size: clamp(0.9em, 3vw, 1.1em);
                margin-bottom: 5px;
            }
            
            .resultado .ganhador {
                font-size: clamp(0.8em, 2.8vw, 1em);
                margin: 5px 0;
                padding: 5px;
                max-width: 100%;
            }
            
            .resultado .ganhador.nome-extra-longo {
                font-size: clamp(0.7em, 2vw, 0.85em) !important;
                line-height: 1.1;
                padding: 4px;
            }
            
            .resultado .premio {
                font-size: clamp(0.75em, 2.2vw, 0.9em);
                padding: 6px 8px;
            }

            .aviso {
                color: #fff;
                background: rgba(255,68,68,0.9);
                padding: 20px;
                border-radius: 15px;
                margin-top: 20px;
                font-size: 1.1em;
            }

            .loading {
                color: #fff;
                font-size: 1.2em;
                margin-top: 20px;
            }
        }
    </style>
</head>
<body>
    <video id="video-fundo" autoplay loop muted playsinline>
        <source src="fundo roleta.mp4" type="video/mp4">
    </video>
    <div class="overlay-escuro"></div>
    
    <div class="main-wrapper">
        <img src="roleta topo.png" alt="Roleta Topo" class="topo-imagem">
        <div class="content-wrapper">
            <div class="card-premios">
                <h3>Próximos<br>Prêmios:</h3>
                <div id="listaPremios">
                    <div class="sem-premios">Carregando...</div>
                </div>
            </div>

            <div class="container">
                <h1 id="tituloRoleta">🎡 Roleta de Prêmios 🎡</h1>
                <div class="roleta-wrapper">
                    <div class="seta-indicador"></div>
                    <div class="roleta-container">
                      <canvas id="roletaCanvas"></canvas>
                      <div class="centro-roleta" id="centroRoleta">
                          <img src="logounisense.jpeg" alt="Logo Unisense" class="logo-roleta" id="logoRoleta">
                          <div class="mensagem-aguardando" id="mensagemAguardando" style="display:none;">
                              A roleta vai começar automaticamente quando alcançar 50 participantes
                          </div>
                      </div>
                  </div>
                </div>

                <div class="resultado" id="resultado">
                    <h2> PARABÉNS! </h2>
                    <div class="ganhador" id="nomeGanhador"></div>
                    <div class="premio" id="premioGanhador"></div>
                </div>

                <div class="loading" id="loading" style="display:none;">
                    Carregando dados...
                </div>
            </div>
        </div>
    </div>

    <script>
        if (typeof CONFIG === 'undefined') {
            console.error('❌ CONFIG.js não foi carregado!');
            alert('Erro: Sistema não configurado corretamente. Recarregue a página.');
        } else {
            console.log('✅ CONFIG.js carregado na roleta');
            console.log('🌐 Domínio:', CONFIG.DOMAIN);
        }

        const urlParams = new URLSearchParams(window.location.search);
        const isAutoSorteio = urlParams.get('auto') === 'true';
        const premioId = urlParams.get('premio_id');
        const premioNome = urlParams.get('premio_nome');

        const POLLING_INTERVAL = 2000;
        let ultimoComandoTimestamp = 0;
        let pollingAtivo = true;

        function logPolling(emoji, mensagem, dados = null) {
            const agora = new Date().toLocaleTimeString('pt-BR');
            console.log(`${emoji} [${agora}] ${mensagem}`, dados || '');
        }

        async function verificarComandos() {
            if (!pollingAtivo) return;
            
            logPolling('🔍', 'Verificando comandos pendentes...');
            
            try {
                const response = await fetch(CONFIG.buildURL(CONFIG.API.VERIFICAR_COMANDO), {
                    method: 'GET',
                    headers: { 
                        'Content-Type': 'application/json',
                        'Accept': 'application/json'
                    }
                });
                
                if (!response.ok) {
                    logPolling('❌', `Erro na resposta: ${response.status}`);
                    return;
                }
                
                const data = await response.json();
                logPolling('📨', 'Resposta recebida:', JSON.stringify(data));
                
                if (data.success && data.comando) {
                    const comando = data.comando;
                    logPolling('✅', 'Comando encontrado:', JSON.stringify(comando));
                    
                    if (comando.timestamp && comando.timestamp !== ultimoComandoTimestamp) {
                        logPolling('🎰', 'NOVO COMANDO DETECTADO! Processando...');
                        ultimoComandoTimestamp = comando.timestamp;
                        
                        await processarComando(comando);
                        
                        try {
                            const limparResponse = await fetch(CONFIG.buildURL(CONFIG.API.LIMPAR_COMANDO), {
                                method: 'POST',
                                headers: { 
                                    'Content-Type': 'application/json',
                                    'Accept': 'application/json'
                                }
                            });
                            
                            if (limparResponse.ok) {
                                logPolling('🧹', 'Comando limpo no servidor');
                            } else {
                                logPolling('⚠️', 'Erro ao limpar comando');
                            }
                        } catch (error) {
                            logPolling('⚠️', 'Erro ao limpar comando:', error.message);
                        }
                    } else {
                        logPolling('⏭️', 'Comando já foi processado, ignorando...');
                    }
                } else {
                    logPolling('⏳', 'Nenhum comando pendente');
                }
            } catch (error) {
                logPolling('❌', 'Erro ao verificar comandos:', error.message);
            }
        }

        async function processarComando(comando) {
            logPolling('⚙️', 'Processando comando:', JSON.stringify(comando));
            
            if (comando.tipo === 'INICIAR_SORTEIO' || comando.acao === 'sortear') {
                logPolling('🎯', 'Comando de sorteio detectado!');
                
                if (comando.participantes && Array.isArray(comando.participantes)) {
                    logPolling('👥', `${comando.participantes.length} participantes recebidos`);
                    
                    await carregarDados();
                    await new Promise(resolve => setTimeout(resolve, 1000));
                    
                    try {
                        if (typeof girarRoleta === 'function') {
                            logPolling('🎰', 'Chamando girarRoleta()...');
                            await girarRoleta();
                            logPolling('✅', 'Sorteio concluído!');
                        } else if (typeof girarRoletaAutomatico === 'function') {
                            logPolling('🎰', 'Chamando girarRoletaAutomatico()...');
                            await girarRoletaAutomatico();
                            logPolling('✅', 'Sorteio automático concluído!');
                        } else if (typeof sortear === 'function') {
                            logPolling('🎰', 'Chamando sortear()...');
                            await sortear();
                            logPolling('✅', 'Sorteio concluído!');
                        } else {
                            logPolling('❌', 'Nenhuma função de sorteio encontrada!');
                            
                            const funcoesDisponiveis = Object.keys(window).filter(k => 
                                typeof window[k] === 'function' && 
                                (k.toLowerCase().includes('sort') || k.toLowerCase().includes('gir'))
                            );
                            logPolling('💡', 'Funções disponíveis:', funcoesDisponiveis.join(', '));
                        }
                    } catch (error) {
                        logPolling('❌', 'Erro ao executar sorteio:', error.message);
                    }
                } else {
                    logPolling('⚠️', 'Comando sem participantes válidos');
                }
            } else {
                logPolling('ℹ️', `Tipo de comando não reconhecido: ${comando.tipo || 'undefined'}`);
            }
        }

        function iniciarPolling() {
            logPolling('🚀', 'Iniciando sistema de polling...');
            logPolling('⏱️', `Intervalo: ${POLLING_INTERVAL}ms (${POLLING_INTERVAL/1000}s)`);
            
            verificarComandos();
            setInterval(verificarComandos, POLLING_INTERVAL);
            
            logPolling('✅', 'Polling ativo! Aguardando comandos...');
        }

        document.addEventListener('visibilitychange', () => {
            if (!document.hidden) {
                logPolling('👁️', 'Página voltou ao foreground - verificando comandos...');
                verificarComandos();
            }
        });

        window.addEventListener('online', () => {
            logPolling('📶', 'Internet reconectada - verificando comandos...');
            verificarComandos();
        });

        if (document.readyState === 'loading') {
            document.addEventListener('DOMContentLoaded', function() {
                logPolling('📄', 'DOM carregado, iniciando polling em 500ms...');
                setTimeout(iniciarPolling, 500);
            });
        } else {
            logPolling('📄', 'DOM já carregado, iniciando polling em 500ms...');
            setTimeout(iniciarPolling, 500);
        }

        logPolling('✅', 'Sistema de polling carregado e pronto!');

        const canvas = document.getElementById('roletaCanvas');
        const ctx = canvas.getContext('2d');
        
        let participantes = [];
        let premios = [];
        let girando = false;
        let anguloAtual = 0;
        let sorteiosComHorarios = [];
        let filaPremios = [];

        const cores = ['#8B0000', '#FFFFFF', '#8B0000', '#FFFFFF', '#8B0000', '#FFFFFF', '#8B0000', '#FFFFFF'];

        function ajustarCanvas() {
            const container = canvas.parentElement;
            const size = Math.min(container.clientWidth, container.clientHeight);
            canvas.width = size;
            canvas.height = size;
            desenharRoleta();
        }

        window.addEventListener('resize', ajustarCanvas);
        ajustarCanvas();

        function filaEstaAtualizada(premiosAtuais, filaAtual) {
            const nomesAtuais = premiosAtuais.map(p => p.nome).sort();
            const nomesFila = filaAtual.map(p => p.nome).sort();
            
            if (nomesAtuais.length !== nomesFila.length) return false;
            
            return nomesAtuais.every((nome, index) => nome === nomesFila[index]);
        }
                    
        function desenharRoleta() {
            console.log('🎨 desenharRoleta() chamada');
            console.log('👥 Participantes disponíveis:', participantes.length);
            console.log('📋 Lista de participantes:', participantes);
            
            const logoRoleta = document.getElementById('logoRoleta');
            const mensagemAguardando = document.getElementById('mensagemAguardando');
            
            if (!canvas.width || !canvas.height || canvas.width < 20 || canvas.height < 20) {
                console.warn('⚠️ Canvas com tamanho inválido, ignorando desenho');
                return;
            }
            
            if (participantes.length === 0) {
                console.log('⚠️ Nenhum participante - mostrando mensagem');
                ctx.fillStyle = '#ddd';
                ctx.fillRect(0, 0, canvas.width, canvas.height);

                logoRoleta.style.display = 'none';
                mensagemAguardando.style.display = 'block';
                return;
            } else {
                console.log('✅ Desenhando roleta com', participantes.length, 'participantes');
                logoRoleta.style.display = 'block';
                mensagemAguardando.style.display = 'none';
            }

            const centerX = canvas.width / 2;
            const centerY = canvas.height / 2;
            const radius = Math.max(20, canvas.width / 2 - 10);
            const sliceAngle = (Math.PI * 2) / participantes.length;

            ctx.clearRect(0, 0, canvas.width, canvas.height);

            participantes.forEach((participante, i) => {
                const startAngle = anguloAtual + sliceAngle * i;
                const endAngle = startAngle + sliceAngle;

                ctx.beginPath();
                ctx.moveTo(centerX, centerY);
                ctx.arc(centerX, centerY, radius, startAngle, endAngle);
                ctx.closePath();
                
                const corBase = cores[i % cores.length];
                ctx.fillStyle = corBase + '4D';
                ctx.fill();

                ctx.save();
                ctx.translate(centerX, centerY);
                ctx.rotate(startAngle + sliceAngle / 2);
                ctx.textAlign = 'right';
                ctx.fillStyle = '#8B0000';

                const fontSize = Math.max(10, Math.floor(canvas.width * 0.032));
                ctx.font = `bold ${fontSize}px Montserrat`;
                ctx.shadowColor = 'rgba(255,255,255,0.8)';
                ctx.shadowBlur = 3;
                ctx.shadowOffsetX = 1;
                ctx.shadowOffsetY = 1;

                const primeiroNome = participante.nome.split(' ')[0];
                
                console.log(`✏️ Desenhando nome na fatia ${i}:`, primeiroNome);
                
                const posicaoTexto = Math.max(30, radius - 20);
                ctx.fillText(primeiroNome, posicaoTexto, 5);

                ctx.restore();
            });
            
            console.log('✅ Roleta desenhada com sucesso!');
        }

        async function girarRoleta() {
            document.getElementById('logoRoleta').style.display = 'block';
            document.getElementById('mensagemAguardando').style.display = 'none';
            
            if (girando) {
                console.log('⚠️ Roleta já está girando, ignorando comando...');
                return;
            }
            
            if (participantes.length === 0) {
                console.error('❌ Ainda não há participantes cadastrados!');
                return;
            }
            
            if (premios.length === 0) {
                console.error('❌ Não há prêmios disponíveis!');
                return;
            }

            console.log('🎰 Iniciando sorteio da roleta...');
            console.log('👥 Total de participantes:', participantes.length);
            console.log('🎁 Prêmios disponíveis:', premios.length);

            girando = true;
            document.getElementById('resultado').classList.remove('ativo');

            const indiceVencedor = Math.floor(Math.random() * participantes.length);
            const vencedor = participantes[indiceVencedor];

            console.log('🎯 Vencedor sorteado:', vencedor.nome);

            const premioSorteado = filaPremios[0];

            console.log('🎁 Prêmio sorteado:', premioSorteado.nome);

            const sliceAngle = (Math.PI * 2) / participantes.length;
            const anguloVencedor = sliceAngle * indiceVencedor + sliceAngle / 2;
            const anguloSeta = -Math.PI / 2;
            const rotacoesCompletas = Math.PI * 2 * 5;
            const anguloFinal = rotacoesCompletas - anguloVencedor + anguloSeta;

            const duracao = 5000;
            const inicio = Date.now();

            function animar() {
                const agora = Date.now();
                const progresso = Math.min((agora - inicio) / duracao, 1);
                const easeOut = 1 - Math.pow(1 - progresso, 3);
                
                anguloAtual = anguloFinal * easeOut;
                desenharRoleta();

                if (progresso < 1) {
                    requestAnimationFrame(animar);
                } else {
                    console.log('✅ Animação da roleta concluída!');
                    mostrarResultado(vencedor, premioSorteado);
                }
            }

            animar();
        }

                        if (comprimento > 15) {
                            ganhadorElemento.classList.add('nome-extra-longo');
                            console.log('✅ Classe "nome-extra-longo" adicionada');
                        } else {
                            ganhadorElemento.classList.remove('nome-extra-longo');
                        }
                    }
                }
            });
        });

        if (document.readyState === 'loading') {
            document.addEventListener('DOMContentLoaded', () => {
                const resultadoDiv = document.getElementById('resultado');
                if (resultadoDiv) {
                    observadorResultado.observe(resultadoDiv, { 
                        attributes: true, 
                        attributeFilter: ['class'] 
                    });
                    console.log('👁️ Observador de resultado configurado');
                }
            });
        } else {
            const resultadoDiv = document.getElementById('resultado');
            if (resultadoDiv) {
                observadorResultado.observe(resultadoDiv, { 
                    attributes: true, 
                    attributeFilter: ['class'] 
                });
                console.log('👁️ Observador de resultado configurado');
            }
        }
    </script>
